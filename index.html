<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Units</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --ink:    #7a1e2e;
  --ink2:   #9a3a4a;
  --surface:#f4f1ec;
  --paper:  #faf8f4;
  --edge:   #e2ddd6;
  --muted:  #8a8a9a;
  --muted2: #b0aaaa;
  --øl:     #b5730a;
  --vin:    #7a1e2e;
  --sprit:  #3d1a08;
  --r:      12px;
  --rs:     8px;
}

body {
  font-family: 'Geist Mono', monospace;
  background: var(--surface);
  color: var(--ink);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: 24px;
}

/* APP HEADER */
.app-header {
  padding: 12px 20px 8px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
  text-align: center;
}
.app-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink);
}

/* WEEK NAV */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 16px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
  position: sticky;
  top: 0;
  z-index: 99;
}
.week-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.nav-btn {
  background: none;
  border: 1px solid var(--edge);
  border-radius: 6px;
  color: var(--muted);
  width: 26px; height: 26px;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:active { background: var(--edge); }

/* DAYS STRIP */
.days-strip {
  display: flex;
  gap: 4px;
  padding: 7px 12px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
}
.day-chip {
  flex: 1;
  background: none;
  border: 1px solid var(--edge);
  border-radius: var(--rs);
  padding: 5px 2px 4px;
  color: var(--muted);
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  transition: all 0.15s;
}
.day-chip .dn { font-size: 8px; letter-spacing: 0.06em; text-transform: uppercase; }
.day-chip .dd { font-size: 13px; font-weight: 600; line-height: 1.2; }
.day-chip .chip-dots { display: flex; gap: 2px; min-height: 4px; align-items: center; margin-top: 2px; flex-wrap: wrap; justify-content: center; max-height: 12px; overflow: hidden; }
.day-chip .chip-dots span { width: 3px; height: 3px; border-radius: 50%; display: block; flex-shrink: 0; }
.day-chip.active { background: var(--ink); border-color: var(--ink); color: var(--surface); }

/* REGISTER */
.register-section { padding: 10px 12px 10px; }
.date-heading {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.reg-buttons { display: flex; flex-direction: row; gap: 7px; }

.reg-row {
  flex: 1;
  display: flex;
  align-items: center;
  border-radius: var(--r);
  overflow: hidden;
  height: 52px;
}

.reg-adj {
  width: 36px;
  height: 100%;
  border: none;
  font-family: 'Geist Mono', monospace;
  font-size: 22px;
  font-weight: 400;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  flex-shrink: 0;
  transition: filter 0.1s;
  user-select: none;
}
.reg-adj:active { filter: brightness(0.82); }

.reg-center {
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}
.reg-count {
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  line-height: 1;
}

.reg-row-øl    .reg-adj, .reg-row-øl    .reg-center { background: var(--øl); }
.reg-row-vin   .reg-adj, .reg-row-vin   .reg-center { background: var(--vin); }
.reg-row-sprit .reg-adj, .reg-row-sprit .reg-center { background: var(--sprit); }

/* DIVIDER */
.section-divider { height: 1px; background: var(--edge); margin: 0 12px; }

/* CALENDAR */
.cal-section { padding: 10px 12px 8px; }

.sub-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.sub-title {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted2);
}
.month-nav { display: flex; align-items: center; gap: 6px; }
.month-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  min-width: 88px;
  text-align: center;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
}
.cal-dh {
  font-size: 9px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted2);
  text-align: center;
  padding: 2px 0 7px;
}
.cal-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 3px 0 3px;
  cursor: pointer;
  border-radius: var(--rs);
  transition: background 0.1s;
}
.cal-cell:active { background: var(--edge); }
.cal-cell.empty  { pointer-events: none; }

.cal-num-wrap {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 3px;
}
.cal-num {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
}
.cal-cell.is-today .cal-num-wrap { background: var(--ink); }
.cal-cell.is-today .cal-num { color: var(--surface); }
.cal-cell.is-selected:not(.is-today) .cal-num-wrap { background: var(--ink2); opacity: 0.75; }
.cal-cell.is-selected:not(.is-today) .cal-num { color: var(--surface); }

.cal-dots {
  display: flex;
  gap: 2px;
  min-height: 5px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 32px;
}
.cal-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* STATS */
.stats-section { padding: 0 12px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

.stat-card {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--r);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.stat-half {
  flex: 1;
  padding: 7px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.stat-half + .stat-half { border-top: 1px solid var(--edge); }
.stat-row-label {
  font-size: 8px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 3px;
}
.stat-row-val { font-size: 16px; font-weight: 400; line-height: 1; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--ink);
  color: var(--surface);
  border-radius: 10px;
  padding: 8px 18px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Drinks</div>
</div>

<div class="week-nav">
  <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
  <span class="week-label" id="week-label">Uke —</span>
  <button class="nav-btn" onclick="changeWeek(1)">›</button>
</div>

<div class="days-strip" id="days-strip"></div>

<div class="register-section">
  <div class="date-heading" id="date-heading">—</div>
  <div class="reg-buttons">
    <div class="reg-row reg-row-øl">
      <button class="reg-adj" onclick="adjust('øl', -1)">−</button>
      <div class="reg-center"><span class="reg-count" id="count-øl">0</span></div>
      <button class="reg-adj" onclick="adjust('øl', 1)">+</button>
    </div>
    <div class="reg-row reg-row-vin">
      <button class="reg-adj" onclick="adjust('vin', -1)">−</button>
      <div class="reg-center"><span class="reg-count" id="count-vin">0</span></div>
      <button class="reg-adj" onclick="adjust('vin', 1)">+</button>
    </div>
    <div class="reg-row reg-row-sprit">
      <button class="reg-adj" onclick="adjust('sprit', -1)">−</button>
      <div class="reg-center"><span class="reg-count" id="count-sprit">0</span></div>
      <button class="reg-adj" onclick="adjust('sprit', 1)">+</button>
    </div>
  </div>
</div>

<div class="section-divider"></div>

<div class="cal-section">
  <div class="sub-header">
    <span class="sub-title">Kalender</span>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="month-label">—</span>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="section-divider" style="margin-bottom:10px"></div>

<div class="stats-section">
  <div class="stats-grid" id="stats-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS_NO   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const DAYS_LONG = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
const MONTHS_NO = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];

const TYPES = [
  { key: 'øl',   color: '#b5730a', emoji: '🍺' },
  { key: 'vin',  color: '#7a1e2e', emoji: '🍷' },
  { key: 'sprit',color: '#3d1a08', emoji: '🥃' },
];
const MAX_TOTAL = 10;

function load() { try { return JSON.parse(localStorage.getItem('drinks_v2') || '{}'); } catch { return {}; } }
function save(d) { localStorage.setItem('drinks_v2', JSON.stringify(d)); }

function ds(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function mondayOf(d) {
  const c = new Date(d); c.setHours(0,0,0,0);
  const wd = c.getDay();
  c.setDate(c.getDate() - (wd === 0 ? 6 : wd - 1));
  return c;
}

function isoWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dow = t.getUTCDay() || 7;
  t.setUTCDate(t.getUTCDate() + 4 - dow);
  const y1 = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  return [t.getUTCFullYear(), Math.ceil(((t - y1) / 86400000 + 1) / 7)];
}

let weekOff  = 0;
let monthOff = 0;
let activeDay = ds(new Date());
const TODAY   = ds(new Date());

function weekDates() {
  const ws = mondayOf(new Date());
  ws.setDate(ws.getDate() + weekOff * 7);
  return Array.from({length:7}, (_, i) => { const d = new Date(ws); d.setDate(ws.getDate()+i); return d; });
}

function changeWeek(n) { weekOff += n; render(); }
function changeMonth(n) { monthOff += n; renderCal(); renderStats(); }

function adjust(type, delta) {
  const all = load();
  if (!all[activeDay]) all[activeDay] = {};
  const cur = all[activeDay][type] || 0;
  const total = TYPES.reduce((sum, t) => sum + (all[activeDay][t.key] || 0), 0);
  const next = Math.max(0, Math.min(cur + delta, cur + (MAX_TOTAL - total)));
  if (next === cur) return;
  if (next === 0) delete all[activeDay][type];
  else all[activeDay][type] = next;
  if (TYPES.every(t => !all[activeDay][t.key])) delete all[activeDay];
  save(all);
  render();
  const val = (all[activeDay] && all[activeDay][type]) || 0;
  const t = TYPES.find(t => t.key === type);
  if (delta > 0) toast(`${t.emoji} +1 (${val} totalt)`);
  else if (delta < 0 && cur > 0) toast(`${t.emoji} −1 (${val} totalt)`);
}

function render() { renderStrip(); renderCounts(); renderCal(); renderStats(); }

function renderStrip() {
  const dates = weekDates();
  const all   = load();
  const [yr, wk] = isoWeek(dates[0]);
  document.getElementById('week-label').textContent = `Uke ${wk} · ${yr}`;

  const pd = new Date(activeDay + 'T12:00:00');
  document.getElementById('date-heading').textContent =
    `${DAYS_LONG[(pd.getDay()+6)%7]} ${pd.getDate()}. ${MONTHS_NO[pd.getMonth()].toLowerCase()}`;

  const strip = document.getElementById('days-strip');
  strip.innerHTML = '';
  dates.forEach(d => {
    const key = ds(d);
    const e   = all[key] || {};
    const btn = document.createElement('button');
    const isActive = key === activeDay;
    btn.className = 'day-chip' + (isActive ? ' active' : '');

    let dotHtml = '<div class="chip-dots">';
    TYPES.forEach(t => {
      const count = e[t.key] || 0;
      for (let i = 0; i < count; i++)
        dotHtml += `<span style="background:${isActive ? 'rgba(255,255,255,0.75)' : t.color}"></span>`;
    });
    dotHtml += '</div>';

    btn.innerHTML = `<span class="dn">${DAYS_NO[(d.getDay()+6)%7]}</span><span class="dd">${d.getDate()}</span>${dotHtml}`;
    btn.onclick = () => { activeDay = key; render(); };
    strip.appendChild(btn);
  });
}

function renderCounts() {
  const all = load();
  const e   = all[activeDay] || {};
  TYPES.forEach(t => {
    document.getElementById(`count-${t.key}`).textContent = e[t.key] || 0;
  });
}

function renderCal() {
  const base = new Date();
  const m  = new Date(base.getFullYear(), base.getMonth() + monthOff, 1);
  const yr = m.getFullYear();
  const mi = m.getMonth();
  const all = load();

  document.getElementById('month-label').textContent = `${MONTHS_NO[mi].slice(0,3)} ${yr}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  ['M','T','O','T','F','L','S'].forEach(h => {
    const el = document.createElement('div');
    el.className = 'cal-dh';
    el.textContent = h;
    grid.appendChild(el);
  });

  const firstWd  = new Date(yr, mi, 1).getDay();
  const offset   = firstWd === 0 ? 6 : firstWd - 1;
  const daysInMo = new Date(yr, mi + 1, 0).getDate();

  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let day = 1; day <= daysInMo; day++) {
    const key  = `${yr}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const e    = all[key] || {};
    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if (key === TODAY)     cls += ' is-today';
    if (key === activeDay) cls += ' is-selected';
    cell.className = cls;

    let dots = '';
    TYPES.forEach(t => {
      const count = e[t.key] || 0;
      for (let i = 0; i < count; i++)
        dots += `<div class="cal-dot" style="background:${t.color}"></div>`;
    });

    cell.innerHTML = `
      <div class="cal-num-wrap"><span class="cal-num">${day}</span></div>
      <div class="cal-dots">${dots}</div>`;
    cell.onclick = () => { activeDay = key; render(); };
    grid.appendChild(cell);
  }
}

function renderStats() {
  const base = new Date();
  const m  = new Date(base.getFullYear(), base.getMonth() + monthOff, 1);
  const yr = m.getFullYear();
  const mi = m.getMonth();
  const all = load();
  const daysInMo = new Date(yr, mi + 1, 0).getDate();

  const monthTotals = {};
  TYPES.forEach(t => monthTotals[t.key] = 0);
  const allWeeks = new Set();

  for (let day = 1; day <= daysInMo; day++) {
    const key = `${yr}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const e   = all[key] || {};
    const [wy, wk] = isoWeek(new Date(yr, mi, day));
    allWeeks.add(`${wy}-${wk}`);
    TYPES.forEach(t => { monthTotals[t.key] += e[t.key] || 0; });
  }

  const weekDays = [];
  const ws = mondayOf(new Date());
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    weekDays.push(ds(d));
  }
  const weekTotals = {};
  TYPES.forEach(t => weekTotals[t.key] = 0);
  weekDays.forEach(key => {
    const e = all[key] || {};
    TYPES.forEach(t => { weekTotals[t.key] += e[t.key] || 0; });
  });

  const weeks = allWeeks.size || 1;

  document.getElementById('stats-grid').innerHTML = TYPES.map(t => `
    <div class="stat-card">
      <div class="stat-half">
        <div class="stat-row-label">Denne uken</div>
        <div class="stat-row-val" style="color:${t.color}">${weekTotals[t.key]}</div>
      </div>
      <div class="stat-half">
        <div class="stat-row-label">Måneden</div>
        <div class="stat-row-val" style="color:${t.color}">${monthTotals[t.key]}</div>
      </div>
      <div class="stat-half">
        <div class="stat-row-label">Snitt/uke</div>
        <div class="stat-row-val" style="color:${t.color}">${(monthTotals[t.key]/weeks).toFixed(1)}</div>
      </div>
    </div>
  `).join('');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 1800);
}

render();
</script>
</body>
</html>
