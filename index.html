<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drinks</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --ink:    #7a1e2e;
  --ink2:   #9a3a4a;
  --surface:#f4f1ec;
  --paper:  #faf8f4;
  --edge:   #e2ddd6;
  --muted:  #8a8a9a;
  --muted2: #b0aaaa;
  --øl:     #b5730a;
  --vin:    #7a1e2e;
  --r:      14px;
  --rs:     9px;
}

body {
  font-family: 'Geist Mono', monospace;
  background: var(--surface);
  color: var(--ink);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: 40px;
}

/* APP HEADER */
.app-header {
  padding: 18px 20px 10px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
  text-align: center;
}
.app-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink);
}

/* WEEK NAV */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
  position: sticky;
  top: 0;
  z-index: 99;
}
.week-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.nav-btn {
  background: none;
  border: 1px solid var(--edge);
  border-radius: 7px;
  color: var(--muted);
  width: 30px; height: 30px;
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:active { background: var(--edge); }

/* DAYS STRIP */
.days-strip {
  display: flex;
  gap: 5px;
  padding: 10px 14px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
}
.day-chip {
  flex: 1;
  background: none;
  border: 1px solid var(--edge);
  border-radius: var(--rs);
  padding: 8px 2px 6px;
  color: var(--muted);
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  transition: all 0.15s;
}
.day-chip .dn { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; }
.day-chip .dd { font-size: 15px; font-weight: 600; line-height: 1.2; }
.day-chip .chip-dots { display: flex; gap: 2px; height: 5px; align-items: center; margin-top: 2px; flex-wrap: wrap; justify-content: center; }
.day-chip .chip-dots span { width: 4px; height: 4px; border-radius: 50%; display: block; flex-shrink: 0; }
.day-chip.active { background: var(--ink); border-color: var(--ink); color: var(--surface); }

/* REGISTER */
.register-section {
  padding: 16px 16px 14px;
}
.date-heading {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.reg-buttons { display: flex; flex-direction: row; gap: 10px; }

.reg-row { flex:1;
  display: flex;
  align-items: center;
  border-radius: var(--r);
  overflow: hidden;
  height: 62px;
}

.reg-adj {
  width: 54px;
  height: 100%;
  border: none;
  font-family: 'Geist Mono', monospace;
  font-size: 26px;
  font-weight: 400;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  flex-shrink: 0;
  transition: filter 0.1s;
  user-select: none;
}
.reg-adj:active { filter: brightness(0.85); }

.reg-center {
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: white;
}
.reg-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.reg-count {
  font-size: 15px;
  font-weight: 600;
  min-width: 28px;
  text-align: center;
  line-height: 1;

}

.reg-row-øl .reg-adj,
.reg-row-øl .reg-center { background: var(--øl); }

.reg-row-vin .reg-adj,
.reg-row-vin .reg-center { background: var(--vin); }

/* DIVIDER */
.section-divider {
  height: 1px;
  background: var(--edge);
  margin: 0 16px;
}

/* CALENDAR */
.cal-section { padding: 16px 16px 12px; }

.sub-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.sub-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted2);
}
.month-nav { display: flex; align-items: center; gap: 8px; }
.month-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  min-width: 100px;
  text-align: center;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-dh {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted2);
  text-align: center;
  padding: 2px 0 8px;
}
.cal-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 4px 0 2px;
  cursor: pointer;
  border-radius: var(--rs);
  transition: background 0.1s;
}
.cal-cell:active { background: var(--edge); }
.cal-cell.empty { pointer-events: none; }

.cal-num-wrap {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 3px;
}
.cal-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
}
.cal-cell.is-today .cal-num-wrap {
  background: var(--ink);
}
.cal-cell.is-today .cal-num { color: var(--surface); }

.cal-cell.is-selected:not(.is-today) .cal-num-wrap {
  background: var(--ink2);
  opacity: 0.75;
}
.cal-cell.is-selected:not(.is-today) .cal-num { color: var(--surface); }

.cal-dots {
  display: flex;
  gap: 2px;
  min-height: 5px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 30px;
}
.cal-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* STATS */
.stats-section { padding: 0 16px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.stat-card {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--r);
  padding: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.stat-half {
  flex: 1;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.stat-half + .stat-half { border-top: 1px solid var(--edge); }
.stat-row-label {
  font-size: 9px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 4px;
}
.stat-row-val { font-size: 20px; font-weight: 400; line-height: 1; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--ink);
  color: var(--surface);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Drinks</div>
</div>

<div class="week-nav">
  <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
  <span class="week-label" id="week-label">Uke —</span>
  <button class="nav-btn" onclick="changeWeek(1)">›</button>
</div>

<div class="days-strip" id="days-strip"></div>

<div class="register-section">
  <div class="date-heading" id="date-heading">—</div>
  <div class="reg-buttons">
    <div class="reg-row reg-row-øl">
      <button class="reg-adj" onclick="adjust('øl', -1)">−</button>
      <div class="reg-center">
        <span class="reg-count" id="count-øl">0</span>
      </div>
      <button class="reg-adj" onclick="adjust('øl', 1)">+</button>
    </div>
    <div class="reg-row reg-row-vin">
      <button class="reg-adj" onclick="adjust('vin', -1)">−</button>
      <div class="reg-center">
        <span class="reg-count" id="count-vin">0</span>
      </div>
      <button class="reg-adj" onclick="adjust('vin', 1)">+</button>
    </div>
  </div>
</div>

<div class="section-divider"></div>

<div class="cal-section">
  <div class="sub-header">
    <span class="sub-title">Kalender</span>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="month-label">—</span>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="section-divider" style="margin-bottom:14px"></div>

<div class="stats-section">
  <div class="stats-grid" id="stats-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS_NO   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const DAYS_LONG = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
const MONTHS_NO = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const ØL_C  = '#b5730a';
const VIN_C = '#7a1e2e';

function load() { try { return JSON.parse(localStorage.getItem('drinks_v1') || '{}'); } catch { return {}; } }
function save(d) { localStorage.setItem('drinks_v1', JSON.stringify(d)); }

function ds(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function mondayOf(d) {
  const c = new Date(d); c.setHours(0,0,0,0);
  const wd = c.getDay();
  c.setDate(c.getDate() - (wd === 0 ? 6 : wd - 1));
  return c;
}

function isoWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dow = t.getUTCDay() || 7;
  t.setUTCDate(t.getUTCDate() + 4 - dow);
  const y1 = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  return [t.getUTCFullYear(), Math.ceil(((t - y1) / 86400000 + 1) / 7)];
}

let weekOff  = 0;
let monthOff = 0;
let activeDay = ds(new Date());
const TODAY   = ds(new Date());

function weekDates() {
  const ws = mondayOf(new Date());
  ws.setDate(ws.getDate() + weekOff * 7);
  return Array.from({length:7}, (_, i) => { const d = new Date(ws); d.setDate(ws.getDate()+i); return d; });
}

function changeWeek(n) { weekOff += n; render(); }
function changeMonth(n) { monthOff += n; renderCal(); renderStats(); }

function adjust(type, delta) {
  const all = load();
  if (!all[activeDay]) all[activeDay] = {};
  const cur = all[activeDay][type] || 0;
  const next = Math.max(0, cur + delta);
  if (next === 0) {
    delete all[activeDay][type];
  } else {
    all[activeDay][type] = next;
  }
  if (!all[activeDay].øl && !all[activeDay].vin) delete all[activeDay];
  save(all);
  render();
  const val = (all[activeDay] && all[activeDay][type]) || 0;
  if (delta > 0) toast(`${type === 'øl' ? '🍺' : '🍷'} +1 (${val} totalt)`);
  else if (delta < 0 && cur > 0) toast(`${type === 'øl' ? '🍺' : '🍷'} −1 (${val} totalt)`);
}

function render() { renderStrip(); renderCounts(); renderCal(); renderStats(); }

function renderStrip() {
  const dates = weekDates();
  const all   = load();
  const [yr, wk] = isoWeek(dates[0]);
  document.getElementById('week-label').textContent = `Uke ${wk} · ${yr}`;

  const pd  = new Date(activeDay + 'T12:00:00');
  document.getElementById('date-heading').textContent =
    `${DAYS_LONG[(pd.getDay()+6)%7]} ${pd.getDate()}. ${MONTHS_NO[pd.getMonth()].toLowerCase()}`;

  const strip = document.getElementById('days-strip');
  strip.innerHTML = '';
  dates.forEach(d => {
    const key = ds(d);
    const e   = all[key] || {};
    const btn = document.createElement('button');
    const isActive = key === activeDay;
    btn.className = 'day-chip' + (isActive ? ' active' : '');

    const ølCount  = e.øl  || 0;
    const vinCount = e.vin || 0;
    let dotHtml = '<div class="chip-dots">';
    for (let i = 0; i < Math.min(ølCount, 3); i++)
      dotHtml += `<span style="background:${isActive ? 'rgba(255,255,255,0.7)' : ØL_C}"></span>`;
    for (let i = 0; i < Math.min(vinCount, 3); i++)
      dotHtml += `<span style="background:${isActive ? 'rgba(255,255,255,0.7)' : VIN_C}"></span>`;
    dotHtml += '</div>';

    btn.innerHTML = `<span class="dn">${DAYS_NO[(d.getDay()+6)%7]}</span><span class="dd">${d.getDate()}</span>${dotHtml}`;
    btn.onclick = () => { activeDay = key; render(); };
    strip.appendChild(btn);
  });
}

function renderCounts() {
  const all = load();
  const e   = all[activeDay] || {};
  document.getElementById('count-øl').textContent  = e.øl  || 0;
  document.getElementById('count-vin').textContent = e.vin || 0;
}

function renderCal() {
  const base = new Date();
  const m  = new Date(base.getFullYear(), base.getMonth() + monthOff, 1);
  const yr = m.getFullYear();
  const mi = m.getMonth();
  const all = load();

  document.getElementById('month-label').textContent =
    `${MONTHS_NO[mi].slice(0,3)} ${yr}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  ['M','T','O','T','F','L','S'].forEach(h => {
    const el = document.createElement('div');
    el.className = 'cal-dh';
    el.textContent = h;
    grid.appendChild(el);
  });

  const firstWd  = new Date(yr, mi, 1).getDay();
  const offset   = firstWd === 0 ? 6 : firstWd - 1;
  const daysInMo = new Date(yr, mi + 1, 0).getDate();

  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let day = 1; day <= daysInMo; day++) {
    const key  = `${yr}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const e    = all[key] || {};
    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if (key === TODAY)     cls += ' is-today';
    if (key === activeDay) cls += ' is-selected';
    cell.className = cls;

    const ølCount  = e.øl  || 0;
    const vinCount = e.vin || 0;
    let dots = '';
    for (let i = 0; i < Math.min(ølCount, 4); i++)
      dots += `<div class="cal-dot" style="background:${ØL_C}"></div>`;
    for (let i = 0; i < Math.min(vinCount, 4); i++)
      dots += `<div class="cal-dot" style="background:${VIN_C}"></div>`;

    cell.innerHTML = `
      <div class="cal-num-wrap"><span class="cal-num">${day}</span></div>
      <div class="cal-dots">${dots}</div>`;
    cell.onclick = () => { activeDay = key; render(); };
    grid.appendChild(cell);
  }
}

function renderStats() {
  const base = new Date();
  const m  = new Date(base.getFullYear(), base.getMonth() + monthOff, 1);
  const yr = m.getFullYear();
  const mi = m.getMonth();
  const all = load();
  const daysInMo = new Date(yr, mi + 1, 0).getDate();

  let ølMonth = 0, vinMonth = 0;
  const allWeeks = new Set();

  for (let day = 1; day <= daysInMo; day++) {
    const key = `${yr}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const e   = all[key] || {};
    const [wy, wk] = isoWeek(new Date(yr, mi, day));
    allWeeks.add(`${wy}-${wk}`);
    if (e.øl)  ølMonth  += e.øl;
    if (e.vin) vinMonth += e.vin;
  }

  // This week
  const weekDays = [];
  const ws = mondayOf(new Date());
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    weekDays.push(ds(d));
  }
  let ølWeek = 0, vinWeek = 0;
  weekDays.forEach(key => {
    const e = all[key] || {};
    ølWeek  += e.øl  || 0;
    vinWeek += e.vin || 0;
  });

  const weeks = allWeeks.size || 1;
  const ølAvg  = (ølMonth  / weeks).toFixed(1);
  const vinAvg = (vinMonth / weeks).toFixed(1);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-half">
        <div class="stat-row-label">Denne uken</div>
        <div class="stat-row-val" style="color:${ØL_C}">${ølWeek}</div>
      </div>
      <div class="stat-half">
        <div class="stat-row-label">Denne måneden</div>
        <div class="stat-row-val" style="color:${ØL_C}">${ølMonth}</div>
      </div>
      <div class="stat-half">
        <div class="stat-row-label">Ukentlig snitt</div>
        <div class="stat-row-val" style="color:${ØL_C}">${ølAvg}</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-half">
        <div class="stat-row-label">Denne uken</div>
        <div class="stat-row-val" style="color:${VIN_C}">${vinWeek}</div>
      </div>
      <div class="stat-half">
        <div class="stat-row-label">Denne måneden</div>
        <div class="stat-row-val" style="color:${VIN_C}">${vinMonth}</div>
      </div>
      <div class="stat-half">
        <div class="stat-row-label">Ukentlig snitt</div>
        <div class="stat-row-val" style="color:${VIN_C}">${vinAvg}</div>
      </div>
    </div>
  `;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 1800);
}

render();
</script>
</body>
</html>
